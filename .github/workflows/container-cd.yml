name: Container CD

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/container-cd.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: nix flake check
        run: nix flake check -L

      - name: build image
        run: nix build .#dockerImage -L

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: load, tag, and push
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/terminal-devenv"
          docker load -i result
          docker tag localhost/terminal-devenv:latest "$IMAGE:latest"
          docker tag localhost/terminal-devenv:latest "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
